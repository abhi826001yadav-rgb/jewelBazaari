<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earrings Collection | jewelBazaari</title>
    <meta name="description" content="Discover gold, diamond, and gemstone earrings for every occasion from verified Indian jewellers.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jewelbazaari.com/earrings.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="jewelBazaari">
    <meta property="og:title" content="Earrings Collection | jewelBazaari">
    <meta property="og:description" content="Discover gold, diamond, and gemstone earrings for every occasion from verified Indian jewellers.">
    <meta property="og:url" content="https://jewelbazaari.com/earrings.html">
    <meta property="og:image" content="https://jewelbazaari.com/images/photo2.jpg">
    <meta property="og:locale" content="en_IN">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Earrings Collection | jewelBazaari">
    <meta name="twitter:description" content="Discover gold, diamond, and gemstone earrings for every occasion from verified Indian jewellers.">
    <meta name="twitter:image" content="https://jewelbazaari.com/images/photo2.jpg">
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="modulepreload" href="js/category-page-init.js">
    <link rel="preload" href="css/mobile-responsive.css" as="style">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/mobile-responsive.css">
    <style>
        html { overflow-x: clip; }
        body { background-color: #FAF7F2; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
        .luxury-card { transition: all 0.3s ease; }
        .luxury-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .section-title { font-family: 'Playfair Display', Georgia, serif; }
        #announcement-placeholder, #header-placeholder, #category-placeholder { position: relative; z-index: 40; }
        main { position: relative; z-index: 1; }
    </style>
</head>
<body>

    <div id="announcement-placeholder"></div>
    <div id="header-placeholder"></div>
    <div id="category-placeholder"></div>

    <section class="jb-category-hero">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-10 jb-category-hero-inner text-center">
            <p class="jb-category-hero-eyebrow">Timeless Elegance</p>
            <h1 class="jb-category-hero-title">Earrings Collection</h1>
            <div class="jb-category-hero-line mx-auto"></div>
            <p class="jb-category-hero-sub">Filtered by category = earrings</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <input type="text" id="search-input" placeholder="Search earrings..."
                class="w-full md:w-80 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:border-[#9B7E4B]">
            <div id="product-count" class="text-sm text-gray-500 whitespace-nowrap"></div>
        </div>

        <h2 class="sr-only">Earrings Listings</h2>
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>

        <div id="no-products" class="hidden text-center py-16">
            <p class="text-gray-500 text-lg">No earrings found yet.</p>
            <a href="vendor-upload.html" class="inline-block mt-4 text-[#9B7E4B] hover:underline">Become a vendor</a>
        </div>
    </main>

    <script type="module">
        import { initCategoryPageDeferred } from './js/category-page-init.js';
        import { getProductsByCategory } from './js/firebase-product-service.js';

        initCategoryPageDeferred(() => getProductsByCategory('earrings'), { pageKey: 'earrings.html' });
    </script>
</body>
</html>
