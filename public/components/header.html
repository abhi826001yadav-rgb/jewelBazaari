<header class="bg-white py-4 relative z-40">
    <div class="max-w-7xl mx-auto px-3 sm:px-4 flex items-center justify-between gap-2 jb-header-standard">
        <a href="index.html" aria-label="jewelBazaari Home" class="jb-logo inline-flex items-center shrink-0 max-w-[11rem]">
            <img src="images/logo.png" alt="jewelBazaari logo" width="176" height="80" class="h-20 w-auto max-w-full object-contain">
        </a>

        <div class="jb-header-search-wrap flex-1 flex justify-center px-3 md:px-5 hidden md:flex min-w-0">
            <form class="jb-header-search-form home-search-bar relative flex items-center w-full max-w-[22rem]" role="search" action="all-jewellery.html" method="get" autocomplete="off">
                <button type="submit" class="jb-header-search-submit home-search-submit" aria-label="Search">
                    <svg class="home-search-icon w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </button>
                <label for="header-search-input" class="sr-only">Search jewellery</label>
                <input type="search" id="header-search-input" name="q" placeholder="Search gold jewellery..."
                    aria-label="Search jewellery"
                    autocomplete="off"
                    enterkeyhint="search"
                    inputmode="search"
                    autocapitalize="off"
                    spellcheck="false"
                    class="jb-header-search home-search-input w-full border border-gray-300 rounded-full py-2 text-sm text-left focus:outline-none focus:ring-0 focus-visible:outline-none">
            </form>
        </div>

        <div class="jb-header-nav flex items-center text-gray-700">
            <a href="index.html" aria-label="Home" class="jb-header-nav-item hover:text-[#4A0E17]">
                <svg class="jb-home-icon md:hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 10.5 12 3l9 7.5"></path>
                    <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"></path>
                </svg>
                <span class="jb-header-nav-label hidden md:inline-flex items-center gap-1">
                    <svg class="jb-home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 10.5 12 3l9 7.5"></path>
                        <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"></path>
                    </svg>
                    Home
                </span>
            </a>
            <button type="button" id="wishlist-icon-btn" data-wishlist-icon title="Wishlist" aria-label="Wishlist" class="jb-header-nav-item relative flex items-center justify-center gap-1 hover:text-[#4A0E17] transition-all duration-300">
                <span data-wishlist-header-heart class="jb-header-nav-emoji md:hidden leading-none opacity-80 transition-all duration-300">🤍</span>
                <span class="jb-header-nav-label hidden md:inline-flex items-center gap-1">
                    <span data-wishlist-header-heart class="leading-none opacity-80 transition-all duration-300">🤍</span>
                    Wishlist
                </span>
            </button>
            <button type="button" id="cart-icon-btn" data-cart-icon title="Cart" aria-label="Cart" class="jb-header-nav-item relative leading-none hover:opacity-80">
                <span class="jb-header-nav-emoji md:hidden" aria-hidden="true">🛒</span>
                <span class="jb-header-nav-label hidden md:inline-flex items-center gap-1">
                    <span class="leading-none" aria-hidden="true">🛒</span>
                    Cart
                </span>
                <span data-cart-count class="hidden absolute -top-2 -right-2 min-w-[18px] h-[18px] px-1 bg-[#4A0E17] text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
            </button>
            <a href="https://www.instagram.com/jewelbazaari.insta/"
                target="_blank"
                rel="noopener noreferrer"
                title="Follow jewelBazaari on Instagram"
                aria-label="Instagram — jewelbazaari.insta"
                class="jb-header-nav-item jb-header-instagram relative flex items-center justify-center gap-1 hover:text-[#4A0E17] transition-all duration-300 leading-none"
                data-instagram-link>
                <img width="94" height="94" src="https://img.icons8.com/3d-fluency/94/instagram-logo.png" alt="" class="jb-header-instagram-icon jb-header-nav-emoji md:hidden" decoding="async" aria-hidden="true">
                <span class="jb-header-nav-label hidden md:inline-flex items-center gap-1">
                    <img width="94" height="94" src="https://img.icons8.com/3d-fluency/94/instagram-logo.png" alt="" class="jb-header-instagram-icon" decoding="async" aria-hidden="true">
                    Instagram
                </span>
            </a>
        </div>
    </div>
</header>
